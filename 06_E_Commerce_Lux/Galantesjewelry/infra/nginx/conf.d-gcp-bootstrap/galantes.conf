# =========================================================================
# NGINX — GCP BOOTSTRAP (HTTP-only, pre-TLS)
# =========================================================================
# Usado durante el primer arranque en la VM, ANTES de tener certs TLS.
# Sirve /.well-known/acme-challenge/* desde /var/www/certbot para que
# certbot pueda emitir certificados con el challenge HTTP-01.
# Una vez emitidos los certs, el orquestador cambia el symlink conf.d-active
# a conf.d-gcp (versi\u00f3n con TLS) y recarga nginx.
# =========================================================================

# Health endpoint (para docker healthcheck del contenedor nginx)
server {
    listen 80 default_server;
    server_name _;

    location = /healthz {
        access_log off;
        return 200 "ok\n";
    }

    # ACME HTTP-01 challenge
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
    }

    location / {
        return 404;
    }
}

# ---- galantesjewelry.com (editorial + admin) ----
server {
    listen 80;
    server_name galantesjewelry.com www.galantesjewelry.com;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
    }

    location = /healthz {
        access_log off;
        proxy_pass http://web:3000/api/health;
    }

    location / {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://web:3000;
    }
}

