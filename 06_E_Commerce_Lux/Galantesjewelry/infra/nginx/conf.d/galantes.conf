# Galante's Jewelry — 3-Domain Nginx Configuration
# Routes:
#   galantesjewelry.com       → Next.js editorial + admin (port 3000)
#   shop.galantesjewelry.com  → Next.js storefront (port 3000)
#   odoo.galantesjewelry.com  → Odoo backend (port 8069, different URL pattern)

# ========================================================================
# 1. GALANTESJEWELRY.COM — Editorial Site + Admin Panel
# ========================================================================
server {
    listen 80;
    server_name galantesjewelry.com www.galantesjewelry.com localhost 127.0.0.1;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Proxy settings for WebSocket support (required for Next.js hot reload in dev)
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_cache_bypass $http_upgrade;
    proxy_read_timeout 60s;

    # Static assets caching (Next.js _next folder)
    location /_next/static {
        proxy_pass http://web:3000;
        proxy_cache_valid 30d;
        access_log off;
    }

    # Health check endpoint
    location /healthz {
        access_log off;
        proxy_pass http://web:3000/api/health;
    }

    # All other traffic to Next.js
    location / {
        proxy_pass http://web:3000;
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
    }
}

# ========================================================================
# 2. SHOP.GALANTESJEWELRY.COM — Next.js Storefront
# ========================================================================
server {
    listen 80;
    server_name shop.galantesjewelry.com;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_cache_bypass $http_upgrade;
    proxy_read_timeout 60s;
    proxy_connect_timeout 60s;

    # Static Odoo image routes remain available here if any legacy links hit
    # them, but storefront routes themselves now go to Next.js.
    location ~* /web/static/ {
        proxy_pass http://odoo:8069;
        proxy_cache_valid 30d;
        access_log off;
    }

    location ~* ^/website/static/ {
        proxy_pass http://odoo:8069;
        proxy_cache_valid 1h;
        access_log off;
    }

    location ~* /web/image/ {
        proxy_pass http://odoo:8069;
        expires 30d;
        access_log off;
    }

    location /health {
        proxy_pass http://odoo:8069;
        access_log off;
    }

    # All storefront traffic goes to the Next.js app.
    location / {
        proxy_pass http://web:3000;
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
    }
}

# ========================================================================
# 3. ODOO.GALANTESJEWELRY.COM — Odoo Backend (ERP Interface)
# ========================================================================
server {
    listen 80;
    server_name odoo.galantesjewelry.com;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_cache_bypass $http_upgrade;
    proxy_read_timeout 60s;
    proxy_connect_timeout 60s;

    # Odoo static files
    location ~* /web/static/ {
        proxy_pass http://odoo:8069;
        proxy_cache_valid 30d;
        access_log off;
    }

    # Odoo backend images & assets
    location ~* /web/image/ {
        proxy_pass http://odoo:8069;
        expires 30d;
        access_log off;
    }

    # Websocket support (for Odoo long-polling)
    location /longpolling {
        proxy_pass http://odoo:8069;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Upgrade "websocket";
    }

    # All Odoo backend traffic
    location / {
        proxy_pass http://odoo:8069;
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
    }
}

# ========================================================================
# Fallback Server — Catch any unknown hostnames (for debugging)
# ========================================================================
server {
    listen 80 default_server;
    server_name _;

    location / {
        return 444;
    }
}
