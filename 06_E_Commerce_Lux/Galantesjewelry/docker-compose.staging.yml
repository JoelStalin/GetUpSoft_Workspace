services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: galantes_stg_web
    restart: always
    ports:
      - "3001:3000"
    deploy:
      resources:
        limits:
          memory: 1G
    environment:
      - NODE_ENV=staging
      - PORT=3000
      - HOSTNAME=0.0.0.0
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - ADMIN_SECRET_KEY=${ADMIN_SECRET_KEY}
      - ODOO_PASSWORD=${ODOO_PASSWORD}
      - ODOO_API_KEY=${ODOO_API_KEY}
      - ODOO_BASE_URL=http://galantes_stg_odoo:8069
      - ODOO_DB=${ODOO_DB:-galantes_staging_db}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - APPOINTMENT_TEST_MODE=true
      - GOOGLE_OAUTH_CLIENT_ID=${GOOGLE_OAUTH_CLIENT_ID}
      - GOOGLE_OAUTH_CLIENT_SECRET=${GOOGLE_OAUTH_CLIENT_SECRET}
      - GOOGLE_OAUTH_REFRESH_TOKEN=${GOOGLE_OAUTH_REFRESH_TOKEN}
      - GOOGLE_OAUTH_REDIRECT_URI=${GOOGLE_OAUTH_REDIRECT_URI}
      - GOOGLE_CALENDAR_ID=${GOOGLE_CALENDAR_ID}
      - GOOGLE_SERVICE_ACCOUNT_EMAIL=${GOOGLE_SERVICE_ACCOUNT_EMAIL}
      - GOOGLE_PRIVATE_KEY=${GOOGLE_PRIVATE_KEY}
      - GMAIL_NOTIFICATION_TO=${GMAIL_NOTIFICATION_TO}
      - GMAIL_SMTP_USER=${GMAIL_SMTP_USER}
      - GMAIL_SMTP_PASS=${GMAIL_SMTP_PASS}
    volumes:
      - stg-app-data:/app/data
    networks:
      - galante-stg-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  odoo:
    build:
      context: ./odoo
      dockerfile: Dockerfile
    container_name: galantes_stg_odoo
    restart: always
    command: -i base,galantes_jewelry
    ports:
      - "8079:8069"
    deploy:
      resources:
        limits:
          memory: 1.5G
    environment:
      - DB_HOST=galantes_stg_db
      - POSTGRES_USER=${POSTGRES_USER:-odoo}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - ODOO_PASSWORD=${POSTGRES_PASSWORD}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - ODOO_DB=${ODOO_DB:-galantes_staging_db}
    volumes:
      - stg-odoo-data:/var/lib/odoo
    networks:
      - galante-stg-net
    depends_on:
      - db
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8069/web/login', timeout=5)\" >/dev/null 2>&1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s

  db:
    image: postgres:15-alpine
    container_name: galantes_stg_db
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M
    environment:
      - POSTGRES_DB=${ODOO_DB:-galantes_staging_db}
      - POSTGRES_USER=${POSTGRES_USER:-odoo}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - stg-postgres-data:/var/lib/postgresql/data
    networks:
      - galante-stg-net

  nginx:
    image: nginx:1.27-alpine
    container_name: galantes_stg_nginx
    restart: always
    ports:
      - "8082:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - galante-stg-net
    depends_on:
      web:
        condition: service_healthy
      odoo:
        condition: service_healthy

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: galantes_stg_tunnel
    restart: unless-stopped
    networks:
      - galante-stg-net
    command: tunnel --no-autoupdate run --protocol http2 --token ${CF_TUNNEL_TOKEN_STAGING}
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  galante-stg-net:
    driver: bridge

volumes:
  stg-app-data:
  stg-odoo-data:
  stg-postgres-data:
