services:
  web-dev:
    image: node:20-alpine
    container_name: galantes_web_dev
    working_dir: /app
    command: sh -c "npm ci && npm run dev -- --hostname 0.0.0.0 --port 3000"
    environment:
      - NODE_ENV=development
      - PORT=3000
      - HOSTNAME=0.0.0.0
      - APP_DATA_DIR=/app/data
      - WATCHPACK_POLLING=true
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      # - ADMIN_PASSWORD=${ADMIN_PASSWORD:-CHANGE_ME_LOCAL_ADMIN_PASSWORD}
      - ADMIN_SECRET_KEY=${ADMIN_SECRET_KEY:-CHANGE_ME_LOCAL_ADMIN_SECRET}
    volumes:
      - .:/app
      - /app/node_modules
      - ./data:/app/data
    ports:
      - "3000:3000"
