services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: galantes_web
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOSTNAME=0.0.0.0
      - APP_DATA_DIR=/app/data
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-CHANGE_ME_LEGACY_ADMIN_PASSWORD}
      - ADMIN_SECRET_KEY=${ADMIN_SECRET_KEY:-CHANGE_ME_LOCAL_ADMIN_SECRET}
    volumes:
      # Carpeta de datos persistente obligatoria
      - ./data:/app/data
    expose:
      - "3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - galante-net

  nginx:
    image: nginx:1.27-alpine
    container_name: galantes_nginx
    restart: always
    depends_on:
      web:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    ports:
      - "${NGINX_PORT:-8080}:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - galante-net

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: galantes_tunnel
    restart: always
    profiles:
      - tunnel
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    command: tunnel --no-autoupdate run --token ${CF_TUNNEL_TOKEN}
    depends_on:
      nginx:
        condition: service_healthy
    networks:
      - galante-net

networks:
  galante-net:
    driver: bridge
