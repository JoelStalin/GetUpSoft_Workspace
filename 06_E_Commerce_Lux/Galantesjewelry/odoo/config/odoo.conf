[options]
; Odoo Configuration File for Galante's Jewelry
; ===== Database Config =====
db_host = galantes_db
db_port = 5432
db_user = odoo
; db_password is injected at runtime by /custom-entrypoint.sh via --db_password
db_name = galantes_db
dbfilter = ^galantes_db$

; ===== HTTP/HTTPS Server =====
http_port = 8069
proxy_mode = True
secure_cookies = False

; ===== Addons Path =====
; Enterprise modules + Custom modules
addons_path = /mnt/enterprise-addons,/mnt/extra-addons

; ===== Logging =====
logfile = /var/log/odoo/odoo.log
log_level = info
logrotate = True

; ===== Workers / Performance =====
workers = 2
longpolling_port = 8072
max_cron_threads = 1

; ===== Security =====
admin_passwd = admin_password_change_me
list_db = True

; ===== Email =====
smtp_server = localhost
smtp_port = 25
smtp_user = false
smtp_password = false
smtp_encryption = none

; ===== Dev / Debug =====
dev_mode = False
