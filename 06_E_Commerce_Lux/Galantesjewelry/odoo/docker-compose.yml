services:
  odoo:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ${GALANTES_ODOO_CONTAINER_NAME:-galantes_odoo}
    depends_on:
      - postgres
    environment:
      - DB_HOST=${DB_HOST:-postgres}
      - DB_PORT=${DB_PORT:-5432}
      - POSTGRES_DB=${POSTGRES_DB:-galantes_prod}
      - ODOO_DB=${ODOO_DB:-galantes_prod}
      - POSTGRES_USER=${POSTGRES_USER:-odoo}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-CHANGE_ME_LOCAL_POSTGRES_PASSWORD}
      - ODOO_AUTO_INSTALL_MODULES=${ODOO_AUTO_INSTALL_MODULES:-true}
    restart: always
    ports:
      - "${GALANTES_ODOO_HTTP_PORT:-8069}:8069"
      - "${GALANTES_ODOO_LONGPOLL_PORT:-8072}:8072"
    volumes:
      - odoo-data:/var/lib/odoo
      - ./addons:/mnt/extra-addons
      - ./config/odoo.conf:/etc/odoo/odoo.conf:ro
      - ./logs:/var/log/odoo
    networks:
      - galante-odoo-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8069"]
      interval: 30s
      timeout: 10s
      retries: 3

  postgres:
    image: postgres:15-alpine
    container_name: ${GALANTES_DB_CONTAINER_NAME:-galantes_db}
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-galantes_prod}
      - POSTGRES_USER=${POSTGRES_USER:-odoo}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-CHANGE_ME_LOCAL_POSTGRES_PASSWORD}
    restart: always
    ports:
      - "${GALANTES_POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - galante-odoo-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-odoo} -d $${POSTGRES_DB:-galantes_prod}"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  galante-odoo-net:
    driver: bridge

volumes:
  odoo-data:
  postgres-data:
