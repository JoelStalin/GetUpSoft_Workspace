worker_processes auto;
events { worker_connections 1024; }
http {
    include mime.types;
    default_type application/octet-stream;
    sendfile on;
    server {
        listen 80;
        server_name galantesjewelry.com www.galantesjewelry.com odoo.galantesjewelry.com admin.galantesjewelry.com shop.galantesjewelry.com;

        location / {
            # Redirigir a la app web por defecto
            proxy_pass http://galantes_web:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        # Regla específica para Odoo si el host es odoo. o admin.
        location ~* ^/(web|web|longpolling) {
             if ($host ~* (odoo|admin)\.galantesjewelry\.com) {
                proxy_pass http://galantes_odoo:8069;
             }
             proxy_pass http://galantes_web:3000;
             proxy_set_header Host $host;
        }
    }
}
