# =========================================================================
# NGINX — GCP PRODUCTION (HTTPS + HTTP->HTTPS redirect + ACME)
# =========================================================================
# Activo DESPU\u00c9S de que scripts/gcp/03-issue-certs.sh haya emitido certs.
# Reusa los volumenes letsencrypt-etc y letsencrypt-webroot del compose.
# =========================================================================

# Note: map $http_upgrade $connection_upgrade is already defined in
# infra/nginx/nginx.conf (http context), so we do NOT redefine it here.

# --- Health endpoint + ACME (default server) ---
server {
    listen 80 default_server;
    server_name _;

    location = /healthz {
        access_log off;
        return 200 "ok\n";
    }

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
    }

    location / {
        return 444;
    }
}

# =========================================================================
# galantesjewelry.com + www -> HTTPS editorial + admin (Next.js)
# =========================================================================
server {
    listen 80;
    server_name galantesjewelry.com www.galantesjewelry.com;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name galantesjewelry.com www.galantesjewelry.com;

    ssl_certificate     /etc/letsencrypt/live/galantesjewelry.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/galantesjewelry.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1h;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "1; mode=block" always;

    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_cache_bypass $http_upgrade;
    proxy_read_timeout 60s;
    client_max_body_size 25m;

    location /_next/static {
        proxy_pass http://web:3000;
        proxy_cache_valid 30d;
        access_log off;
    }

    location = /healthz {
        access_log off;
        proxy_pass http://web:3000/api/health;
    }

    location / {
        proxy_pass http://web:3000;
    }

    location ~ /\. {
        deny all;
        access_log off;
    }
}

# =========================================================================
# shop.galantesjewelry.com -> HTTPS Next.js storefront
# =========================================================================
server {
    listen 80;
    server_name shop.galantesjewelry.com;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name shop.galantesjewelry.com;

    ssl_certificate     /etc/letsencrypt/live/shop.galantesjewelry.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/shop.galantesjewelry.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1h;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_read_timeout 120s;
    proxy_connect_timeout 60s;
    client_max_body_size 50m;

    location ~* /web/static/ {
        proxy_pass http://odoo:8069;
        proxy_cache_valid 30d;
        access_log off;
    }

    location ~* ^/website/static/ {
        proxy_pass http://odoo:8069;
        proxy_cache_valid 1h;
        access_log off;
    }

    location ~* /web/image/ {
        proxy_pass http://odoo:8069;
        expires 30d;
        access_log off;
    }

    location /longpolling {
        proxy_pass http://odoo:8069;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Upgrade "websocket";
    }

    location / {
        proxy_pass http://web:3000;
    }

    location ~ /\. {
        deny all;
        access_log off;
    }
}

