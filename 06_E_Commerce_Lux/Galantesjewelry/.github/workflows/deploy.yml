name: Deploy to GCP Production

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: 'Force full rebuild even without code changes'
        type: boolean
        default: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: GCP Production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: SSH and Deploy to GCP
        uses: appleboy/ssh-action@master
        env:
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          ADMIN_SECRET_KEY: ${{ secrets.ADMIN_SECRET_KEY }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          ODOO_PASSWORD: ${{ secrets.ODOO_PASSWORD }}
          ODOO_API_KEY: ${{ secrets.ODOO_API_KEY }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
        with:
          host: ${{ secrets.GCP_VM_IP }}
          username: yoeli
          key: ${{ secrets.GCP_SSH_PRIVATE_KEY }}
          command_timeout: 30m
          envs: ADMIN_PASSWORD,ADMIN_SECRET_KEY,POSTGRES_PASSWORD,ODOO_PASSWORD,ODOO_API_KEY,STRIPE_SECRET_KEY
          script: |
            set -Eeuo pipefail

            # Ir al directorio raíz
            cd ~/galantesjewelry || exit 1

            docker_cmd() {
              if docker ps >/dev/null 2>&1; then
                docker "$@"
              else
                sudo -n docker "$@"
              fi
            }

            compose() {
              docker_cmd compose --env-file .env.prod -f docker-compose.production.yml "$@"
            }

            ensure_cloudflared() {
              echo "Levantando cloudflared (blindado)..."
              compose up -d --no-deps --force-recreate cloudflared
              sleep 10
              return 0
            }

            # --- BLINDAJE DE VARIABLES (ATÓMICO) ---
            TMP_ENV=".env.prod.tmp"
            [ -f .env.prod ] && cp .env.prod "$TMP_ENV" || touch "$TMP_ENV"

            update_env_safe() {
              key="$1"; value="$2"
              [ -z "$value" ] && return 0
              # Eliminar si existe para evitar duplicados
              sed -i "/^${key}=/d" "$TMP_ENV"
              # Asegurar newline
              [ -s "$TMP_ENV" ] && [ -z "$(tail -c1 "$TMP_ENV")" ] || echo "" >> "$TMP_ENV"
              echo "${key}=${value}" >> "$TMP_ENV"
            }

            update_env_safe "ADMIN_PASSWORD" "$ADMIN_PASSWORD"
            update_env_safe "ADMIN_SECRET_KEY" "$ADMIN_SECRET_KEY"
            update_env_safe "POSTGRES_PASSWORD" "$POSTGRES_PASSWORD"
            update_env_safe "POSTGRES_USER" "odoo"
            update_env_safe "ODOO_DB" "galantes_db"
            update_env_safe "ODOO_PASSWORD" "$ODOO_PASSWORD"
            update_env_safe "ODOO_API_KEY" "$ODOO_API_KEY"
            update_env_safe "STRIPE_SECRET_KEY" "$STRIPE_SECRET_KEY"
            
            # Reemplazo atómico para que Docker no lea un archivo a medias
            mv "$TMP_ENV" .env.prod
            chmod 600 .env.prod

            # --- PERSISTENCIA Y REINICIO AUTOMÁTICO ---
            echo "Asegurando Docker persistente..."
            sudo systemctl enable docker || true

            # --- TUNNEL PRIMERO Y SIEMPRE ---
            ensure_cloudflared
            
            # 1. Backup de Seguridad (No bloqueante)
            echo "Realizando backup de seguridad..."
            TS=$(date +%Y%m%d_%H%M%S)
            BK_DIR="backups/predeploy/${TS}"
            mkdir -p "$BK_DIR"
            cp .env.prod "$BK_DIR/"
            
            # Intento de backup de DB
            DB_CONT=$(docker_cmd ps -q -f name=galantes_db)
            if [ -n "$DB_CONT" ]; then
              docker_cmd exec "$DB_CONT" sh -lc "PGPASSWORD=\"$POSTGRES_PASSWORD\" pg_dump -U odoo -d galantes_db --no-owner --no-privileges --clean --if-exists" > "$BK_DIR/galantes_db.sql" 2>/dev/null || echo "Aviso: Backup de DB falló"
            fi

            # 2. Sincronizar código con Git
            echo "Sincronizando cambios de Git..."
            git fetch origin main
            PREV_HEAD=$(git rev-parse HEAD)
            git reset --hard origin/main
            CHANGES=$(git diff --name-only "$PREV_HEAD" HEAD)

            # 3. Sincronizar maestros de datos
            [ -f cms_prod_local.json ] && cp -f cms_prod_local.json data/cms.json
            [ -f integrations_prod.json ] && cp -f integrations_prod.json data/integrations.json

            # 4. Desplegar Web si hay cambios
            if echo "$CHANGES" | grep -qE "(app/|components/|lib/|src/|public/|package.json|Dockerfile|docker-compose|next.config)" || [ "${{ inputs.force_rebuild }}" = "true" ]; then
              echo "Cambios detectados en la aplicación. Reconstruyendo..."
              compose build web
              compose up -d --no-deps web
              ensure_cloudflared
            fi

            # 5. Desplegar Odoo si hay cambios
            if echo "$CHANGES" | grep -qE "(odoo/|docker-compose)" || [ "${{ inputs.force_rebuild }}" = "true" ]; then
              echo "Actualizando módulos de Odoo..."
              compose exec -T odoo odoo -c /etc/odoo/odoo.conf -d galantes_db -u galantes_jewelry --stop-after-init || true
              compose restart odoo
              ensure_cloudflared
            fi

            # 6. Limpieza
            docker_cmd image prune -f
            ensure_cloudflared
            echo "DESPLIEGUE FINALIZADO EXITOSAMENTE Y TUNNEL BLINDADO."
