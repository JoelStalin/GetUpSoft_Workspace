epics:
  - id: "EPIC-JARVIS-001"
    title: "Voice Pipeline Foundation"
    goal: "Conectar voz simulada o transcripción con el Prompt Interpreter de ORCA."
    stories:
      - id: "US-JARVIS-001"
        title: "Interfaz JarvisListener para recibir transcripciones de voz"
        status: "done"
        priority: "high"
      - id: "US-JARVIS-002"
        title: "Interfaz STTProvider para conectar Vosk, Whisper local u otros providers"
        status: "done"
        priority: "high"
      - id: "US-JARVIS-003"
        title: "Pasar una transcripción de voz por el mismo Prompt Interpreter de ORCA"
        status: "done"
        priority: "high"
      - id: "US-JARVIS-004"
        title: "Convertir cada comando de voz en historia, tarea o prompt"
        status: "done"
        priority: "high"
  - id: "EPIC-JARVIS-002"
    title: "Custom Dictionary"
    goal: "Corregir términos de dominio antes de clasificar intención."
    stories:
      - id: "US-JARVIS-005"
        title: "Diccionario personalizado para términos como ORCA, Jarvis, n8n y Obsidian"
        status: "done"
        priority: "high"
      - id: "US-JARVIS-006"
        title: "Aplicar correcciones del diccionario antes de clasificar intención"
        status: "done"
        priority: "high"
      - id: "US-JARVIS-007"
        title: "Pruebas para validar reemplazos de términos"
        status: "done"
        priority: "medium"
  - id: "EPIC-JARVIS-003"
    title: "Voice Command Router"
    goal: "Separar wake word, comando y pistas de intención para ORCA."
    stories:
      - id: "US-JARVIS-008"
        title: "Detectar scrum-management desde comandos tipo tarea/backlog/sprint"
        status: "done"
        priority: "high"
      - id: "US-JARVIS-009"
        title: "Detectar bugfix desde comandos de voz de reparación"
        status: "done"
        priority: "high"
      - id: "US-JARVIS-010"
        title: "Detectar comandos de generación de prompt"
        status: "done"
        priority: "medium"
  - id: "EPIC-JARVIS-004"
    title: "Transcript History"
    goal: "Guardar historial local opcional con foco en privacidad."
    stories:
      - id: "US-JARVIS-011"
        title: "Guardar historial local de transcripciones"
        status: "done"
        priority: "medium"
      - id: "US-JARVIS-012"
        title: "Permitir desactivar historial"
        status: "done"
        priority: "medium"
      - id: "US-JARVIS-013"
        title: "Redacción básica de secretos en transcripciones"
        status: "done"
        priority: "high"
  - id: "EPIC-JARVIS-005"
    title: "Future Desktop Bridge"
    goal: "Preparar fases futuras sin contaminarlas en el MVP."
    stories:
      - id: "US-JARVIS-017"
        title: "Provider local explícito para Vosk bajo el contrato STTProvider"
        status: "done"
        priority: "high"
      - id: "US-JARVIS-014"
        title: "Hotkey global en una fase futura"
        status: "planned"
        priority: "low"
      - id: "US-JARVIS-015"
        title: "Salida por clipboard en una fase futura"
        status: "planned"
        priority: "low"
      - id: "US-JARVIS-016"
        title: "Detección de aplicación activa en una fase futura"
        status: "planned"
        priority: "low"

