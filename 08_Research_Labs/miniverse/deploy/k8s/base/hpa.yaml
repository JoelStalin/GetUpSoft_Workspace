apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: miniverse-hpa
  namespace: getupsoft
  labels:
    app.kubernetes.io/name: miniverse
    app.kubernetes.io/part-of: getupsoft-workspace
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: miniverse

  minReplicas: 1
  maxReplicas: 3

  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 75

  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
