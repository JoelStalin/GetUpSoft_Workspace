apiVersion: apps/v1
kind: Deployment
metadata:
  name: miniverse
  namespace: getupsoft
  labels:
    app.kubernetes.io/name: miniverse
    app.kubernetes.io/part-of: getupsoft-workspace
    app.kubernetes.io/component: server
    app.kubernetes.io/version: "0.1.0"
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: miniverse
  template:
    metadata:
      labels:
        app.kubernetes.io/name: miniverse
        app.kubernetes.io/part-of: getupsoft-workspace
        app.kubernetes.io/component: server
      annotations:
        prometheus.io/scrape: "false"
    spec:
      serviceAccountName: miniverse

      # Security context
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault

      containers:
      - name: miniverse
        image: getupsoft/miniverse:latest
        imagePullPolicy: IfNotPresent

        # Container port
        ports:
        - name: http
          containerPort: 3000
          protocol: TCP

        # Environment variables
        envFrom:
        - configMapRef:
            name: miniverse-config

        env:
        - name: NODE_ENV
          value: "production"

        # Health checks
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3

        readinessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2

        # Resource requests and limits
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 1000m
            memory: 1Gi

        # Security context
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          capabilities:
            drop:
            - ALL
          runAsNonRoot: true
          runAsUser: 1000

        # Volume mounts
        volumeMounts:
        - name: tmp
          mountPath: /tmp

      # Volumes
      volumes:
      - name: tmp
        emptyDir:
          sizeLimit: 500Mi

      # Pod configuration
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
