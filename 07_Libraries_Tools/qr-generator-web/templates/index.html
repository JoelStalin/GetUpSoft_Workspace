<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>QR GEN | GetUpSoft</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000000;
            --foreground: #ffffff;
            --accent: #ff0038;
            --border: #222;
            --glass: rgba(255, 255, 255, 0.05);
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            background: var(--bg);
            color: var(--foreground);
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
        }

        /* Dot Matrix Pattern */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: radial-gradient(#333 1px, transparent 0);
            background-size: 24px 24px;
            z-index: -1;
            opacity: 0.3;
        }

        .shell {
            width: 100%;
            max-width: 1000px;
            padding: 40px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            backdrop-filter: blur(10px);
        }

        .header {
            grid-column: 1 / -1;
            margin-bottom: 40px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }
        .header h1 {
            margin: 0;
            font-size: 48px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: -0.05em;
        }
        .header span {
            color: var(--accent);
            font-weight: 700;
            text-transform: uppercase;
            font-size: 10px;
            letter-spacing: 0.2em;
        }

        .card {
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 32px;
            backdrop-filter: blur(20px);
        }

        .form-group {
            margin-bottom: 24px;
        }
        label {
            display: block;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #666;
            margin-bottom: 8px;
        }
        input[type="text"],
        input[type="file"],
        input[type="color"],
        select {
            width: 100%;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px 16px;
            color: #fff;
            outline: none;
            font-family: inherit;
        }
        input[type="color"] {
            height: 50px;
            padding: 4px;
            cursor: pointer;
        }

        input[type="submit"], .download-button {
            width: 100%;
            background: #fff;
            color: #000;
            border: none;
            padding: 16px;
            border-radius: 999px;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 0.1em;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-block;
            text-align: center;
            text-decoration: none;
        }
        input[type="submit"]:hover, .download-button:hover {
            opacity: 0.8;
            transform: scale(1.02);
        }

        .qr-display {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        .qr-display img {
            max-width: 100%;
            border-radius: 16px;
            border: 1px solid var(--border);
            background: #fff;
            padding: 20px;
            margin-bottom: 24px;
        }

        @media (max-width: 768px) {
            .shell { grid-template-columns: 1fr; padding: 20px; }
            .header h1 { font-size: 32px; }
        }
    </style>
</head>
<body>
    <div class="shell">
        <div class="header">
            <div>
                <h1>QR GEN</h1>
                <p style="margin: 4px 0 0; font-size: 12px; color: #666;">High precision matrix generator</p>
            </div>
            <span>v2.0.4</span>
        </div>

        <div class="card">
            <form method="POST" enctype="multipart/form-data">
                <div class="form-group">
                    <label for="url">Target URL</label>
                    <input type="text" name="url" id="url" placeholder="https://getupsoft.com">
                </div>
                <div class="form-group">
                    <label for="logo">Brand Logo (Optional)</label>
                    <input type="file" name="logo" id="logo">
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
                    <div class="form-group">
                        <label for="fill_color">Matrix Color</label>
                        <input type="color" name="fill_color" id="fill_color" value="#000000">
                    </div>
                    <div class="form-group">
                        <label for="back_color">Background</label>
                        <input type="color" name="back_color" id="back_color" value="#ffffff">
                    </div>
                </div>
                <div class="form-group">
                    <label for="size_option">Output Resolution</label>
                    <select name="size_option" id="size_option">
                        <option value="Pequeño">Standard</option>
                        <option value="Mediano" selected>High Detail</option>
                        <option value="Grande">Ultra 4K</option>
                    </select>
                </div>
                <input type="submit" value="Execute Generation">
            </form>
        </div>

        <div class="card qr-display">
            {% if qr_image_base64 %}
                <label>Output Preview</label>
                <img src="data:image/png;base64,{{ qr_image_base64 }}" alt="QR Code">
                <a href="/download_qr?qr_image={{ qr_image_base64|urlencode }}" class="download-button">
                    Export Matrix
                </a>
            {% else %}
                <div style="color: #444; text-transform: uppercase; font-size: 10px; letter-spacing: 0.2em;">
                    Waiting for input parameters...
                </div>
            {% endif %}
        </div>
    </div>

    {% if error_message %}
        <div style="position: fixed; bottom: 20px; right: 20px; background: var(--accent); color: #fff; padding: 12px 24px; border-radius: 12px; font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; z-index: 100;">
            Error: {{ error_message }}
        </div>
    {% endif %}
</body>
</html>
