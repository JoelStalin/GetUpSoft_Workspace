apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  labels:
    app.kubernetes.io/name: auth-service
    app.kubernetes.io/part-of: getupsoft
    getupsoft.io/trusted: "true"
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: auth-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: auth-service
        app.kubernetes.io/part-of: getupsoft
        getupsoft.io/trusted: "true"
    spec:
      serviceAccountName: auth-service
      containers:
        - name: auth
          image: 123456789012.dkr.ecr.us-east-1.amazonaws.com/getupsoft/auth-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: SERVICE_NAME
              value: auth-service
            - name: UVICORN_WORKERS
              value: "2"
          envFrom:
            - configMapRef:
                name: getupsoft-common
            - secretRef:
                name: getupsoft-secrets
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
      nodeSelector:
        getupsoft.io/workload: api
      tolerations:
        - key: "dedicated"
          operator: "Equal"
          value: "api"
          effect: "NoSchedule"
