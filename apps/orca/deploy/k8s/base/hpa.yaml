# Horizontal Pod Autoscaler for ORCA
# WARNING: Only enable this if .artifacts is shared across replicas (NFS, GlusterFS, etc.)
# With local SQLite state, multi-replica scaling requires proper shared storage.
# This is kept as a template for future multi-replica setups.

apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: orca-hpa
  namespace: getupsoft
  labels:
    app.kubernetes.io/name: orca
    app.kubernetes.io/part-of: getupsoft-workspace
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: orca

  minReplicas: 1
  maxReplicas: 3

  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70

  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80

  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
      - type: Percent
        value: 100
        periodSeconds: 30
      - type: Pods
        value: 1
        periodSeconds: 30
      selectPolicy: Max
