apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: getupsoft

resources:
  - namespace.yaml
  - serviceaccount.yaml
  - configmap.yaml
  - pvc.yaml
  - deployment.yaml
  - service.yaml
  # Optional resources (uncomment to enable):
  # - ingress.yaml      # Enable only if you have an Ingress Controller
  # - hpa.yaml          # Enable only if using shared storage for multi-replica

commonLabels:
  app.kubernetes.io/name: orca
  app.kubernetes.io/part-of: getupsoft-workspace
  app.kubernetes.io/managed-by: kustomize

commonAnnotations:
  # Add any global annotations here
  # example.com/owner: "devops-team"
