# EXAMPLE ONLY - DO NOT COMMIT WITH REAL VALUES
# Replace with actual secrets management (Sealed Secrets, External Secrets Operator, etc.)
# This file should be added to .gitignore before using real credentials
#
# To create a Secret from this template:
# 1. Copy this file to secret.yaml (NOT tracked by git)
# 2. Replace CHANGE_ME placeholders with actual values
# 3. Apply: kubectl apply -f secret.yaml
# 4. Reference in Deployment: secretRef.name: orca-secrets

apiVersion: v1
kind: Secret
metadata:
  name: orca-secrets
  namespace: getupsoft
  labels:
    app.kubernetes.io/name: orca
    app.kubernetes.io/part-of: getupsoft-workspace
type: Opaque
stringData:
  # OpenAI API Key (if using OpenAI models)
  # OPENAI_API_KEY: "sk-CHANGE_ME"

  # Anthropic API Key (if using Claude models)
  # ANTHROPIC_API_KEY: "sk-ant-CHANGE_ME"

  # Google API Key (if using Gemini)
  # GOOGLE_API_KEY: "CHANGE_ME"

  # NvidiaAPI Key (if using NVIDIA models)
  # NVIDIA_API_KEY: "CHANGE_ME"

  # Model config path (if using custom models.json)
  # AI_ORCHESTRATOR_CONFIG_PATH: "/etc/orca/config/models.json"

  # Additional credentials as needed
  # CUSTOM_SECRET: "CHANGE_ME"

---
