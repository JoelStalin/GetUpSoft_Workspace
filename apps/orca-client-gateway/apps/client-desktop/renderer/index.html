<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GetUpSoft Orca Agent</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app">
      <header class="header">
        <h1>GetUpSoft Orca Agent</h1>
        <button id="openApiBtn" class="ghost">Open API</button>
      </header>

      <main class="grid">
        <section class="panel">
          <h2>Activation</h2>
          <label>Base URL</label>
          <input id="baseUrlInput" placeholder="https://..."/>
          <label>Pairing Code</label>
          <input id="pairingCodeInput" placeholder="GTS-1234-XL"/>
          <label>Device Name</label>
          <input id="deviceNameInput" value="QA Desktop Agent"/>
          <div class="actions">
            <button id="connectBtn">Connect</button>
            <button id="disconnectBtn" class="danger">Disconnect</button>
          </div>
          <p id="activationMessage" class="hint">Not enrolled.</p>
        </section>

        <section class="panel">
          <h2>Status</h2>
          <div class="kv"><span>State</span><strong id="stateValue">Disconnected</strong></div>
          <div class="kv"><span>Tenant</span><strong id="tenantValue">-</strong></div>
          <div class="kv"><span>Device</span><strong id="deviceValue">-</strong></div>
          <div class="kv"><span>Last Heartbeat</span><strong id="heartbeatValue">-</strong></div>
          <div class="kv"><span>Last Poll</span><strong id="pollValue">-</strong></div>
        </section>

        <section class="panel wide">
          <h2>Activity Log</h2>
          <pre id="logView"></pre>
        </section>
      </main>
    </div>
    <script src="./renderer.js"></script>
  </body>
  </html>
