apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: getupsoft-site-hpa
  namespace: getupsoft
  labels:
    app.kubernetes.io/name: getupsoft-site
    app.kubernetes.io/part-of: getupsoft-workspace
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: getupsoft-site

  minReplicas: 2
  maxReplicas: 4

  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70

  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80

  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
      - type: Percent
        value: 50
        periodSeconds: 30
