apiVersion: apps/v1
kind: Deployment
metadata:
  name: getupsoft-site
  namespace: getupsoft
  labels:
    app.kubernetes.io/name: getupsoft-site
    app.kubernetes.io/part-of: getupsoft-workspace
    app.kubernetes.io/component: web
    app.kubernetes.io/version: "0.1.0"
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: getupsoft-site
  template:
    metadata:
      labels:
        app.kubernetes.io/name: getupsoft-site
        app.kubernetes.io/part-of: getupsoft-workspace
        app.kubernetes.io/component: web
      annotations:
        prometheus.io/scrape: "false"
    spec:
      serviceAccountName: getupsoft-site

      # Security context
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault

      containers:
      - name: getupsoft-site
        image: getupsoft/site:latest
        imagePullPolicy: IfNotPresent

        # Container port
        ports:
        - name: http
          containerPort: 5173
          protocol: TCP

        # Environment variables
        envFrom:
        - configMapRef:
            name: getupsoft-site-config

        env:
        - name: NODE_ENV
          value: "production"

        # Health checks
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3

        readinessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2

        # Resource requests and limits
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi

        # Security context
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
          runAsNonRoot: true
          runAsUser: 1000

        # Volume mounts
        volumeMounts:
        - name: nginx-cache
          mountPath: /var/cache/nginx
        - name: nginx-pid
          mountPath: /var/run

      # Volumes
      volumes:
      - name: nginx-cache
        emptyDir:
          sizeLimit: 100Mi
      - name: nginx-pid
        emptyDir:
          sizeLimit: 10Mi

      # Pod configuration
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
