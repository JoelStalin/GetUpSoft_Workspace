server {
    listen 80;
    server_name chefalitas.com.do;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://chefalitas.com.do$request_uri;
    }
}

server {
    listen 80;
    server_name www.chefalitas.com.do;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://chefalitas.com.do$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name chefalitas.com.do;

    client_max_body_size 20m;
    proxy_read_timeout 120s;
    proxy_connect_timeout 120s;
    proxy_send_timeout 120s;

    ssl_certificate     /etc/letsencrypt/live/chefalitas.com.do/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/chefalitas.com.do/privkey.pem;

    location / {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_pass http://odoo:8069;
    }
}
