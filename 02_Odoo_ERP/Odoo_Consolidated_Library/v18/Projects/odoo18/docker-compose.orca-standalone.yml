services:
  odoo:
    image: odoo:18.0
    container_name: orca-odoo18
    depends_on:
      - db
    restart: unless-stopped
    ports:
      - "8069:8069"
    environment:
      - HOST=db
      - USER=odoo
      - PASSWORD=odoo
    volumes:
      - odoo-data:/var/lib/odoo
      - ./addons:/mnt/extra-addons
      - ./config/odoo.conf:/etc/odoo/odoo.conf
      - ./logs:/var/log/odoo
    networks:
      - odoo-net

  db:
    image: postgres:15
    container_name: orca-odoo18-db
    restart: unless-stopped
    environment:
      - POSTGRES_DB=odoo
      - POSTGRES_USER=odoo
      - POSTGRES_PASSWORD=odoo
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - odoo-net

networks:
  odoo-net:
    driver: bridge

volumes:
  odoo-data:
  postgres-data:
