apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: orca-artifacts-pvc
  namespace: getupsoft
  labels:
    app.kubernetes.io/name: orca
    app.kubernetes.io/part-of: getupsoft-workspace
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  # Optional: specify a storage class if using specialized storage
  # storageClassName: standard
