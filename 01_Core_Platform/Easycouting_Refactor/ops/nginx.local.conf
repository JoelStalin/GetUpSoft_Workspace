map $http_upgrade $connection_upgrade {
  default upgrade;
  '' close;
}

# Docker Desktop host gateway (IPv4) to reach local SPA processes started on Windows host.
map $host $host_gateway {
  default 192.168.65.254;
}

map $host $frontend_upstream {
  default $host_gateway:18083;
  getupsoft.com.do $host_gateway:18085;
  www.getupsoft.com.do $host_gateway:18085;
  admin.getupsoft.com.do $host_gateway:18081;
  cliente.getupsoft.com.do $host_gateway:18082;
  socios.getupsoft.com.do $host_gateway:18084;
}

map $host $origin_upstream {
  default $frontend_upstream;
  api.getupsoft.com.do web:8000;
}

server {
  listen 80;
  server_name _;

  client_max_body_size 16m;

  location /healthz {
    add_header Content-Type text/plain;
    return 200 'ok';
  }

  # API host goes directly to backend app.
  location / {
    proxy_pass http://$origin_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
  }

  # Force API paths to backend regardless of hostname.
  location ^~ /api/ {
    proxy_pass http://web:8000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
  }
}
