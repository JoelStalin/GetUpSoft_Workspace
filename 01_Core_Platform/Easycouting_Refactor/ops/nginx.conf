map $http_upgrade $connection_upgrade {
  default upgrade;
  '' close;
}

server {
  listen 80;
  server_name dgii.getupsoft.com.do dgiicliente.getupsoft.com.do dgiiadmin.getupsoft.com.do app.getupsoft.com.do;

  client_max_body_size 16m;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location /healthz {
    add_header Content-Type text/plain;
    return 200 'ok';
  }

  location / {
    return 301 https://$host$request_uri;
  }
}

server {
  listen 443 ssl;
  server_name dgii.getupsoft.com.do dgiicliente.getupsoft.com.do dgiiadmin.getupsoft.com.do app.getupsoft.com.do;

  ssl_certificate /etc/letsencrypt/live/dgii.getupsoft.com.do/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/dgii.getupsoft.com.do/privkey.pem;

  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers on;

  client_max_body_size 16m;

  gzip on;
  gzip_comp_level 5;
  gzip_types application/json text/plain text/css application/javascript application/xml;

  add_header X-Content-Type-Options nosniff always;
  add_header X-Frame-Options DENY always;
  add_header Referrer-Policy no-referrer-when-downgrade always;
  add_header X-XSS-Protection "1; mode=block" always;

  proxy_read_timeout 65s;
  proxy_send_timeout 65s;

  location /healthz {
    add_header Content-Type text/plain;
    return 200 'ok';
  }

  location / {
    proxy_pass http://web:8000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_buffering on;
    proxy_buffers 16 32k;
    proxy_busy_buffers_size 64k;
  }
}
