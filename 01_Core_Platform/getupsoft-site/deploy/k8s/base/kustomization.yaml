apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: getupsoft

resources:
  - configmap.yaml
  - deployment.yaml
  - service.yaml
  - hpa.yaml
  # Optional: uncomment to enable ingress
  # - ingress.yaml

commonLabels:
  app.kubernetes.io/name: getupsoft-site
  app.kubernetes.io/part-of: getupsoft-workspace
  app.kubernetes.io/managed-by: kustomize
