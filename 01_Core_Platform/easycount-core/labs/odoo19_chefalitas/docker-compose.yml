services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: odoo
      POSTGRES_PASSWORD: odoo
    ports:
      - "55439:5432"
    volumes:
      - odoo19_chefalitas_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U odoo -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 10

  odoo:
    build:
      context: ../..
      dockerfile: labs/odoo19_chefalitas/Dockerfile
    depends_on:
      db:
        condition: service_healthy
    environment:
      HOST: db
      USER: odoo
      PASSWORD: odoo
    ports:
      - "19069:8069"
    volumes:
      - "./odoo.conf:/etc/odoo/odoo.conf:ro"
      - "../../integration/odoo/odoo19_getupsoft_do_localization:/mnt/getupsoft-addons:ro"
      - "/mnt/c/Users/yoeli/Documents/cell_odoo/addons/enterprise:/mnt/enterprise-addons:ro"
      - "${CHEFALITAS_ROOT:-/mnt/c/Users/yoeli/Documents/Chefalitas}/addons:/mnt/chefalitas-addons:ro"
      - "../../scripts/automation/odoo19_chefalitas:/mnt/project-scripts:ro"
      - "odoo19_chefalitas_data:/var/lib/odoo"
    command: ["odoo", "-c", "/etc/odoo/odoo.conf"]

volumes:
  odoo19_chefalitas_pgdata:
  odoo19_chefalitas_data:
