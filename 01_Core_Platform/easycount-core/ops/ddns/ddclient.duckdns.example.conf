# Example only. Do not commit real tokens.
# Intended for a fallback setup where MiDominio keeps stable CNAMEs like:
#   api.getupsoft.com.do     CNAME your-subdomain.duckdns.org.
#   admin.getupsoft.com.do   CNAME your-subdomain.duckdns.org.
#   cliente.getupsoft.com.do CNAME your-subdomain.duckdns.org.
#
# Recommended primary approach remains Cloudflare Tunnel.

daemon=300
ssl=yes
protocol=duckdns
use=web, web=checkip.amazonaws.com/, web-skip=
server=www.duckdns.org
login=your-subdomain
password=your-duckdns-token
your-subdomain.duckdns.org
