epics:
  - id: "EPIC-1"
    title: "Inicialización del Workspace"
    goal: "Preparar una base mantenible y gobernada por Scrum para ORCA."
    stories:
      - id: "US-001"
        title: "Estructura base Python documentada"
        status: "done"
        priority: "high"
      - id: "US-002"
        title: "Plantillas de issue, PR y CI"
        status: "done"
        priority: "high"
      - id: "US-003"
        title: "Product backlog versionado en YAML"
        status: "done"
        priority: "high"
  - id: "EPIC-2"
    title: "Prompt Interpreter Local"
    goal: "Interpretar solicitudes desordenadas sin usar LLMs remotos."
    stories:
      - id: "US-004"
        title: "Interpretar prompts desordenados y devolver instrucciones estructuradas"
        status: "done"
        priority: "high"
      - id: "US-005"
        title: "Normalizar texto sin usar LLMs"
        status: "done"
        priority: "high"
      - id: "US-006"
        title: "Clasificar intención con ML local sin consumir tokens"
        status: "done"
        priority: "high"
      - id: "US-007"
        title: "Traducir prompts offline antes de enviarlos a un modelo externo"
        status: "done"
        priority: "medium"
  - id: "EPIC-3"
    title: "Skills y Routing"
    goal: "Enrutar solicitudes a skills configurables y versionadas."
    stories:
      - id: "US-008"
        title: "Definir skills en YAML para enrutar tareas"
        status: "done"
        priority: "high"
      - id: "US-009"
        title: "Generar prompts especializados por skill"
        status: "done"
        priority: "high"
      - id: "US-010"
        title: "Versionar skills sin tocar el core"
        status: "done"
        priority: "medium"
  - id: "EPIC-4"
    title: "Jarvis Audio Input"
    goal: "Convertir audio local en entrada equivalente al pipeline de texto."
    stories:
      - id: "US-011"
        title: "Hablarle a Jarvis y convertir audio en texto offline"
        status: "done"
        priority: "medium"
      - id: "US-012"
        title: "Procesar la transcripción por el mismo pipeline"
        status: "done"
        priority: "medium"
  - id: "EPIC-5"
    title: "Scrum Project Tracking"
    goal: "Alinear cada solicitud con backlog, sprint y reglas de entrega."
    stories:
      - id: "US-013"
        title: "Mapear prompts a épica, historia, tareas y criterios de aceptación"
        status: "done"
        priority: "high"
      - id: "US-014"
        title: "Definition of Ready y Definition of Done por historia"
        status: "done"
        priority: "high"
      - id: "US-015"
        title: "Reportes de estado por sprint sin saltar fases"
        status: "done"
        priority: "medium"
  - id: "EPIC-6"
    title: "Error Recovery para modelos gratuitos"
    goal: "Delegar continuidad cuando un flujo asistido detecta errores."
    stories:
      - id: "US-016"
        title: "Generar prompts específicos para que modelos gratuitos continúen la implementación"
        status: "done"
        priority: "high"
      - id: "US-017"
        title: "Prompts de recuperación por bugfix, test, refactor y documentación"
        status: "done"
        priority: "high"
      - id: "US-018"
        title: "Registrar errores detectados, causa probable y prompt de continuación"
        status: "done"
        priority: "medium"
  - id: "EPIC-7"
    title: "Memoria local y orquestación futura"
    goal: "Preparar memoria Obsidian local y puntos de integración para n8n."
    stories:
      - id: "US-019"
        title: "Exportar resúmenes e interpretaciones a un vault local compatible con Obsidian"
        status: "done"
        priority: "medium"
      - id: "US-020"
        title: "Definir contrato base para integración futura con n8n"
        status: "done"
        priority: "medium"
  - id: "EPIC-8"
    title: "Autonomous Delivery Policy"
    goal: "Asegurar que ORCA cierre tareas completas sin pausas innecesarias."
    stories:
      - id: "US-021"
        title: "Definir una política de ejecución autónoma en docs y prompts"
        status: "done"
        priority: "high"
  - id: "EPIC-9"
    title: "Operational Deployment"
    goal: "Exponer ORCA como servicio persistente y desplegarlo de forma reproducible."
    stories:
      - id: "US-022"
        title: "Exponer ORCA mediante un servicio HTTP local para automatización y health checks"
        status: "done"
        priority: "high"
      - id: "US-023"
        title: "Desplegar ORCA en ssh.getupsoft.com.do con systemd y verificación remota"
        status: "planned"
        priority: "high"
  - id: "EPIC-10"
    title: "Jarvis OpenTypeless-Inspired Integration"
    goal: "Incorporar contratos y adaptadores de voz inspirados en OpenTypeless sin romper el core offline."
    stories:
      - id: "US-024"
        title: "Documentar la integración Jarvis inspirada en OpenTypeless con ADR, research y backlog"
        status: "done"
        priority: "high"
      - id: "US-025"
        title: "Crear contratos Jarvis para STT, diccionario, routing de voz e historial local"
        status: "done"
        priority: "high"
      - id: "US-026"
        title: "Conectar Jarvis con PromptInterpreter y CLI sin grabación real"
        status: "done"
        priority: "high"
      - id: "US-027"
        title: "Agregar pruebas unitarias del pipeline Jarvis inspirado en OpenTypeless"
        status: "done"
        priority: "high"
