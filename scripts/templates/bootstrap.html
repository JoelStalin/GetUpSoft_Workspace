<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GetUpSoft Orca Agent - Initial Setup</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 500px;
            padding: 40px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo {
            font-size: 48px;
            margin-bottom: 16px;
        }

        h1 {
            font-size: 28px;
            color: #333;
            margin-bottom: 8px;
        }

        .subtitle {
            color: #666;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 30px;
        }

        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .message {
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            display: block;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            display: block;
        }

        .loading {
            display: none;
            text-align: center;
            color: #667eea;
            font-size: 14px;
        }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(102, 126, 234, 0.2);
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .info-box {
            background: #f0f4ff;
            border-left: 4px solid #667eea;
            padding: 12px;
            margin-bottom: 20px;
            border-radius: 4px;
            font-size: 13px;
            color: #333;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">🤖</div>
            <h1>Orca Agent Setup</h1>
            <p class="subtitle">Initial configuration required</p>
        </div>

        <div class="info-box">
            <strong>Welcome!</strong> This is the first-time setup for GetUpSoft Orca Agent.
            Configure your root credentials to continue.
        </div>

        <form id="setupForm">
            <div id="message" class="message"></div>

            <div class="form-group">
                <label for="username">Username</label>
                <input
                    type="text"
                    id="username"
                    name="username"
                    value="root"
                    disabled
                    title="Root user is the default administrator"
                >
            </div>

            <div class="form-group">
                <label for="password">Root Password</label>
                <input
                    type="password"
                    id="password"
                    name="password"
                    placeholder="Enter a strong password"
                    required
                    minlength="8"
                >
            </div>

            <div class="form-group">
                <label for="confirm">Confirm Password</label>
                <input
                    type="password"
                    id="confirm"
                    name="confirm"
                    placeholder="Re-enter password"
                    required
                    minlength="8"
                >
            </div>

            <div class="button-group">
                <button type="submit" class="btn-primary">
                    <span class="spinner" id="spinner" style="display: none;"></span>
                    Complete Setup
                </button>
            </div>

            <div class="loading" id="loading">
                <span class="spinner"></span>
                Configuring agent...
            </div>
        </form>
    </div>

    <script>
        const form = document.getElementById('setupForm');
        const messageDiv = document.getElementById('message');
        const loadingDiv = document.getElementById('loading');
        const spinner = document.getElementById('spinner');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirm').value;

            // Validate
            if (password !== confirm) {
                showMessage('Passwords do not match', 'error');
                return;
            }

            if (password.length < 8) {
                showMessage('Password must be at least 8 characters', 'error');
                return;
            }

            // Submit
            spinner.style.display = 'inline-block';
            loadingDiv.style.display = 'block';
            form.querySelector('button').disabled = true;

            try {
                const response = await fetch('/api/bootstrap/configure', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        username: 'root',
                        password: password
                    })
                });

                const data = await response.json();

                if (response.ok && data.status === 'configured') {
                    showMessage('✅ Setup complete! Redirecting...', 'success');

                    // Display API key
                    if (data.api_key) {
                        alert('Your API Key:\n\n' + data.api_key + '\n\nSave this - you\'ll need it!');
                    }

                    // Redirect after 2 seconds
                    setTimeout(() => {
                        window.location.href = '/api/status';
                    }, 2000);
                } else {
                    showMessage(data.message || 'Setup failed', 'error');
                }
            } catch (error) {
                showMessage('Error: ' + error.message, 'error');
            } finally {
                spinner.style.display = 'none';
                loadingDiv.style.display = 'none';
                form.querySelector('button').disabled = false;
            }
        });

        function showMessage(message, type) {
            messageDiv.textContent = message;
            messageDiv.className = 'message ' + type;
            messageDiv.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }
    </script>
</body>
</html>
