name: Deploy GetUpSoft Site to Production

on:
  push:
    branches:
      - main
    paths:
      - 'apps/site/**'
      - '.github/workflows/deploy-getupsoft-site.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install cloudflared
        env:
          CLOUDFLARED_VERSION: "2026.5.0"
        run: |
          curl -fsSL -o /tmp/cloudflared.deb "https://github.com/cloudflare/cloudflared/releases/download/${CLOUDFLARED_VERSION}/cloudflared-linux-amd64.deb"
          sudo dpkg -i /tmp/cloudflared.deb

      - name: Deploy to code.getupsoft.com
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          CLOUDFLARE_ACCESS_CLIENT_ID: ${{ secrets.CLOUDFLARE_ACCESS_CLIENT_ID }}
          CLOUDFLARE_ACCESS_CLIENT_SECRET: ${{ secrets.CLOUDFLARE_ACCESS_CLIENT_SECRET }}
          DEPLOY_PATH: /home/ubuntu/workspaces/GetUpSoft_Workspace_main_clean
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          mkdir -p ~/.ssh
          echo "$DEPLOY_SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          cat > ~/.ssh/config << SSHCONF
          Host deploy-target
            HostName ${DEPLOY_HOST}
            User ${DEPLOY_USER}
            IdentityFile ~/.ssh/deploy_key
            IdentitiesOnly yes
            StrictHostKeyChecking accept-new
            ServerAliveInterval 30
            ConnectTimeout 30
            ProxyCommand cloudflared access ssh --hostname %h --service-token-id ${CLOUDFLARE_ACCESS_CLIENT_ID} --service-token-secret ${CLOUDFLARE_ACCESS_CLIENT_SECRET}
          SSHCONF

          ssh deploy-target << EOF
          set -e

          echo "📂 Navigating to workspace..."
          cd "$DEPLOY_PATH"

          echo "🔄 Pulling latest changes from GitHub..."
          git fetch origin main
          git reset --hard origin/main

          echo "🔨 Building Docker image for getupsoft-site..."
          cd apps/site
          docker build -t getupsoft-site:latest .

          echo "🚀 Stopping previous container..."
          docker stop getupsoft-site-web-1 2>/dev/null || true
          docker rm getupsoft-site-web-1 2>/dev/null || true

          echo "📦 Starting new container..."
          docker run -d \
            --name getupsoft-site-web-1 \
            --network bridge \
            -p 127.0.0.1:3120:5173 \
            -e NODE_ENV=production \
            getupsoft-site:latest

          echo "⏳ Waiting for container to be healthy..."
          sleep 5

          echo "✅ Testing deployment..."
          if curl -sf http://localhost:3120/health > /dev/null; then
            echo "✅ GetUpSoft Site is running"
          else
            echo "❌ Failed to connect to site"
            exit 1
          fi

          echo "📁 Syncing static production roots served by Nginx..."
          GLOBAL=/home/ubuntu/getupsoft/rebranding-2026/global
          RD=/home/ubuntu/getupsoft/rebranding-2026/do
          TMP=/tmp/getupsoft-site-dist-$(date +%s)
          mkdir -p "\$TMP" "\$GLOBAL" "\$RD"
          docker cp getupsoft-site-web-1:/usr/share/nginx/html/. "\$TMP"/
          find "\$GLOBAL" -mindepth 1 -maxdepth 1 -exec rm -rf {} +
          find "\$RD" -mindepth 1 -maxdepth 1 -exec rm -rf {} +
          cp -a "\$TMP"/. "\$GLOBAL"/
          cp -a "\$TMP"/. "\$RD"/
          rm -rf "\$TMP"

          echo "🧹 Purging Cloudflare cache..."
          curl -X POST "https://api.cloudflare.com/client/v4/zones/$CLOUDFLARE_ZONE_ID/purge_cache" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}' || echo "⚠️  Cache purge request sent (may be rate limited)"

          echo "✅ Deployment completed successfully"
          EOF

      - name: Verify deployment
        if: success()
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          CLOUDFLARE_ACCESS_CLIENT_ID: ${{ secrets.CLOUDFLARE_ACCESS_CLIENT_ID }}
          CLOUDFLARE_ACCESS_CLIENT_SECRET: ${{ secrets.CLOUDFLARE_ACCESS_CLIENT_SECRET }}
        run: |
          mkdir -p ~/.ssh
          echo "$DEPLOY_SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          cat > ~/.ssh/config << SSHCONF
          Host deploy-target
            HostName ${DEPLOY_HOST}
            User ${DEPLOY_USER}
            IdentityFile ~/.ssh/deploy_key
            IdentitiesOnly yes
            StrictHostKeyChecking accept-new
            ServerAliveInterval 30
            ConnectTimeout 30
            ProxyCommand cloudflared access ssh --hostname %h --service-token-id ${CLOUDFLARE_ACCESS_CLIENT_ID} --service-token-secret ${CLOUDFLARE_ACCESS_CLIENT_SECRET}
          SSHCONF

          ssh deploy-target << 'EOF'
          echo "🔍 Verification Tests:"
          echo "1. Container status:"
          docker ps | grep getupsoft-site-web-1 || echo "⚠️ Container not found"
          echo ""
          echo "2. Recent logs:"
          docker logs --tail 5 getupsoft-site-web-1 || true
          echo ""
          echo "3. Network connectivity:"
          curl -I http://localhost:3120/ | head -5 || echo "❌ No response"
          echo ""
          echo "4. Public host routing:"
          curl -s -H "Host: getupsoft.com" http://127.0.0.1/ | grep -q '<div id="root"></div>' && echo "✅ Global root served"
          curl -s -H "Host: getupsoft.com.do" http://127.0.0.1/ | grep -q '<div id="root"></div>' && echo "✅ RD root served"
          EOF

      - name: Notify success
        if: success()
        run: |
          echo "✅ Deployment Successful!"
          echo "Site deployed to: https://getupsoft.com"
          echo "Cloudflare cache purged"

      - name: Notify failure
        if: failure()
        run: |
          echo "❌ Deployment Failed"
          echo "Check logs above for details"
          exit 1
