name: ORCA Kubernetes CI

on:
  push:
    branches: [main, develop, "feat/kubernetes-*"]
    paths:
      - "03_AI_Automation/orca/**"
      - ".github/workflows/orca-kubernetes-ci.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "03_AI_Automation/orca/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: joelstalin/getupsoft-orca

jobs:
  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: 03_AI_Automation/orca
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy

      - name: Lint with ruff
        run: ruff check src/ tests/ --exit-zero

      - name: Type check with mypy
        run: mypy src/ --no-error-summary 2>&1 | head -20 || true

  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: 03_AI_Automation/orca
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest pytest-cov

      - name: Run tests
        run: pytest tests/ -v --tb=short --co 2>&1 | head -20

  docker:
    runs-on: ubuntu-latest
    needs: [lint, test]
    permissions:
      contents: read
      packages: write
    defaults:
      run:
        working-directory: 03_AI_Automation/orca
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (no push)
        uses: docker/build-push-action@v5
        with:
          context: 03_AI_Automation/orca
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  kubernetes:
    runs-on: ubuntu-latest
    needs: [lint, test]
    defaults:
      run:
        working-directory: 03_AI_Automation/orca
    steps:
      - uses: actions/checkout@v4

      - name: Set up Kustomize
        run: |
          curl -s "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash
          sudo mv kustomize /usr/local/bin/

      - name: Validate Kustomize base
        run: |
          kustomize build deploy/k8s/base/ > /tmp/base.yaml
          echo "Generated base manifest:"
          wc -l /tmp/base.yaml

      - name: Validate Kustomize dev overlay
        run: |
          kustomize build deploy/k8s/overlays/dev > /tmp/dev.yaml
          echo "Generated dev manifest:"
          wc -l /tmp/dev.yaml

      - name: Validate Kustomize prod overlay
        run: |
          kustomize build deploy/k8s/overlays/prod > /tmp/prod.yaml
          echo "Generated prod manifest:"
          wc -l /tmp/prod.yaml

      - name: Validate YAML syntax
        run: |
          pip install pyyaml
          python3 -c "
          import yaml
          for f in ['/tmp/base.yaml', '/tmp/dev.yaml', '/tmp/prod.yaml']:
              with open(f) as x:
                  yaml.safe_load(x)
              print(f'✓ {f} is valid YAML')
          "

  success:
    runs-on: ubuntu-latest
    needs: [lint, test, docker, kubernetes]
    if: always()
    steps:
      - name: Check results
        run: |
          if [[ "${{ needs.lint.result }}" == "failure" || \
                "${{ needs.test.result }}" == "failure" || \
                "${{ needs.docker.result }}" == "failure" || \
                "${{ needs.kubernetes.result }}" == "failure" ]]; then
            echo "❌ One or more checks failed"
            exit 1
          fi
          echo "✅ All checks passed"
