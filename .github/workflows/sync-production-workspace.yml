name: Sync Production Workspace

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      deploy_user:
        description: "SSH user on ssh.getupsoft.com.do"
        required: true
        default: "ubuntu"
      deploy_path:
        description: "Workspace path to sync"
        required: true
        default: "/home/ubuntu/workspaces/GetUpSoft_Workspace_main_clean"

concurrency:
  group: production-workspace-sync-main
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Validate required secret
        run: |
          set -euo pipefail
          test -n "${{ secrets.SUDO_PASSWORD }}"

      - name: Install sshpass
        run: |
          sudo apt-get update
          sudo apt-get install -y sshpass

      - name: Sync production workspace from main
        env:
          DEPLOY_HOST: ssh.getupsoft.com.do
          DEPLOY_USER: ${{ github.event.inputs.deploy_user || 'ubuntu' }}
          DEPLOY_PATH: ${{ github.event.inputs.deploy_path || '/home/ubuntu/workspaces/GetUpSoft_Workspace_main_clean' }}
          TARGET_SHA: ${{ github.sha }}
          SUDO_PASSWORD: ${{ secrets.SUDO_PASSWORD }}
        run: |
          set -euo pipefail

          cat > /tmp/sync-production-workspace.sh << EOF
          set -e
          test -d "$DEPLOY_PATH/.git"
          cd "$DEPLOY_PATH"
          BEFORE_SHA=\$(git rev-parse --short HEAD)
          flock /tmp/getupsoft-workspace-sync.lock bash -lc 'git fetch origin main && git reset --hard $TARGET_SHA'
          AFTER_SHA=\$(git rev-parse --short HEAD)
          FULL_SHA=\$(git rev-parse HEAD)
          echo "before=\$BEFORE_SHA"
          echo "after=\$AFTER_SHA"
          test "\$FULL_SHA" = "$TARGET_SHA"
          git status --short --branch
          EOF

          for attempt in 1 2 3; do
            echo "SSH sync attempt ${attempt}/3"
            if sshpass -p "$SUDO_PASSWORD" ssh \
              -o PreferredAuthentications=password \
              -o PubkeyAuthentication=no \
              -o StrictHostKeyChecking=accept-new \
              -o ConnectionAttempts=3 \
              "$DEPLOY_USER@$DEPLOY_HOST" 'bash -s' < /tmp/sync-production-workspace.sh; then
              exit 0
            fi
            sleep $((attempt * 10))
          done

          echo "Unable to sync workspace on $DEPLOY_HOST after 3 attempts."
          exit 1
